<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glowing Text</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

.glow-text{
    font-size:90px;
    font-weight:bold;
    text-transform:uppercase;
    animation: glow 3s infinite alternate;
}

/* Different glowing shades */
@keyframes glow {

    0%{
        color:#ff0000;
        text-shadow:
        0 0 10px #ff0000,
        0 0 20px #ff0000,
        0 0 40px #ff3333,
        0 0 80px #ff6666;
    }

    25%{
        color:#00ffea;
        text-shadow:
        0 0 10px #00ffea,
        0 0 20px #00ffea,
        0 0 40px #00c3ff,
        0 0 80px #0099ff;
    }

    50%{
        color:#00ff00;
        text-shadow:
        0 0 10px #00ff00,
        0 0 20px #00ff00,
        0 0 40px #66ff66,
        0 0 80px #99ff99;
    }

    75%{
        color:#ff00ff;
        text-shadow:
        0 0 10px #ff00ff,
        0 0 20px #ff00ff,
        0 0 40px #ff66ff,
        0 0 80px #ff99ff;
    }

    100%{
        color:#ffff00;
        text-shadow:
        0 0 10px #ffff00,
        0 0 20px #ffff00,
        0 0 40px #ffee66,
        0 0 80px #fff799;
    }
}

</style>
</head>

<body>

<h1 class="glow-text">devopsssssssssssssssssssssssssssssssssssssssss</h1>

</body>
</html>
